version: 1.3.3
cache: true

endpoints:
  custom:
    - name: "Openrouter Arcee"
      apiKey: "${OPENAI_API_KEY}"
      baseURL: "${OPENAI_API_BASE_URL}"
      models:
        default:
          - "${OPENAI_API_MODEL}"
        fetch: true
      titleConvo: true
      summarize: false
  
mcpSettings:
  allowedDomains:
    - "host.docker.internal"

mcpServers:
  my-mcp-server:  # Ваш новый сервер
    type: "sse"
    url: "http://host.docker.internal:3000/api/mcp/sse"  # Укажите ваш адрес и порт
    auth: false
